# ============================================================================
# PERFORMANCE CONFIGURATION (Added 2026-02-01)
# ============================================================================
# Tunable settings for parallel processing, chunking, and memory optimization
performance:
  parallel_loading:
    enabled: true
    max_workers: 8 # Cap at 8 to avoid memory issues; adjust based on system

  chunked_reading:
    enabled: true
    threshold_mb: 50 # Use chunked reading for files over this size
    chunk_size: 100000 # Rows per chunk

  memory_optimization:
    use_categories: true # Convert low-cardinality strings to categorical
    downcast_numeric: true # Downcast int64/float64 to smaller types

  esri_generation:
    n_workers: 4 # Workers for enhanced_esri_output_generator.py
    enable_parallel: true
    chunk_size: 10000 # Normalization chunk size

